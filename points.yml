# ============================================================
# Selenium Assignment - Self Assessment
# ============================================================
student:
  website_under_test: "https://bandcamp.com"

# ----------------------------------------------------------
# AI usage (optional but appreciated)
# ----------------------------------------------------------
ai_usage:
  used: true
  tools: "Claude (Anthropic)"
  description: "Used Claude to scaffold the Page Object classes, write the initial test cases and XPath locators. Reviewed and adjusted the code before submitting."

# ----------------------------------------------------------
# Quality requirements (gatekeepers)
# ----------------------------------------------------------
quality:
  gitignore:
    done: true
    description: "Unnecessary files are ignored (.gitignore covers build output, IDE files, etc.)"
  structured_code:
    done: true
    description: "Code is organized into classes and functions, not one big file"
  readable_code:
    done: true
    description: "Function and method names describe what they do, test suite reads like a test description"
  low_redundancy:
    done: true
    description: "Minimal code duplication, shared logic is extracted into reusable methods"

# ----------------------------------------------------------
# Basic tasks (B)
# ----------------------------------------------------------
basic:
  login_form:
    done: true
    description: "Fill a simple form and submit it (e.g. login with username and password)"
  form_with_user:
    done: false
    description: "Submit a form that requires a registered/logged-in user"
  logout:
    done: false
    description: "Log out from the application and verify it"
  fill_input:
    count: 2
    description: "Fill an input field (text, radio, checkbox, date, etc.) — each different type counts as one"
  send_form:
    count: 2
    description: "Submit a form (each distinct form counts as one)"
  static_page_test:
    done: true
    description: "Test a static page (verify text content, element presence, etc.)"
  multiple_page_test:
    done: true
    description: "Define an array of URLs or page data, iterate over them and verify something on each page"
  complex_xpath:
    count: 8
    description: "Use a complex XPath expression (e.g. //div[@class='content']//a[contains(@href,'profile')])"
  textarea:
    done: false
    description: "Fill or read the content of a textarea element"
  dropdown:
    done: false
    description: "Select an option from a drop-down (using Select class or similar)"
  radio_button:
    done: false
    description: "Select or verify a radio button"
  at_least_4_classes:
    done: true
    description: "Project has at least 4 Java classes"
  at_least_6_classes:
    done: true
    description: "Project has at least 6 Java classes (cumulative with above)"
  at_least_8_classes:
    done: true
    description: "Project has at least 8 Java classes (cumulative with above)"
  explicit_wait:
    done: true
    description: "Use explicit wait (WebDriverWait with ExpectedConditions)"
  page_title:
    done: true
    description: "Read and verify the page title using getTitle()"
  page_object_pattern:
    done: true
    description: "Use Page Object pattern with at least 2 page classes"
  base_page_class:
    done: true
    description: "Create a BasePage class that other page classes extend"
  readable_tests:
    done: true
    description: "Test methods have descriptive names so the suite reads like a test specification"

# ----------------------------------------------------------
# Advanced tasks (A)
# ----------------------------------------------------------
advanced:
  webdriver_config:
    done: true
    description: "Configure WebDriver with custom options (ChromeOptions, window size, language)"
  cookie_manipulation:
    done: true
    description: "Manipulate cookies meaningfully (e.g. add/delete/read cookies, skip consent popup)"
  hover_test:
    done: false
    description: "Perform a hover (mouse over) action and verify the result"
  drag_and_drop:
    done: false
    description: "Drag and drop an element to another location"
  file_upload:
    done: false
    description: "Upload a file through a file input and verify it was uploaded"
  history_test:
    done: true
    description: "Test browser history navigation (e.g. back(), forward())"
  test_dependencies:
    done: false
    description: "Make a test method depend on another using dependsOnMethods or dependsOnGroups"
  email_checking:
    done: false
    description: "Verify an e-mail was sent (e.g. registration activation link, password reset)"
  random_data:
    done: false
    description: "Generate random test data (e.g. random username, email) and use it in a test"
  download_files:
    done: false
    description: "Download one or more files to a folder and verify they were saved"
  config_file:
    done: false
    description: "Store test settings in an external file and read them at runtime"
  javascript_executor:
    done: true
    description: "Use JavascriptExecutor to perform an action (e.g. scroll, click hidden element)"
  screenshot_on_failure:
    done: false
    description: "Automatically take a screenshot when a test fails"
  headless_execution:
    done: true
    description: "Run tests in headless mode (browser without visible UI)"
  cross_browser_testing:
    done: false
    description: "Run the same tests on multiple browsers using parameterization"
  dockerized_execution:
    done: false
    description: "Run tests inside a Docker container"
